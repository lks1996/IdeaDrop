spring:
  application:
    name: ideaDrop
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8390

logging:
  level:
    root: INFO

gemini:
  api:
    key: ${GEMINI_API_KEY}

slack:
  bot:
    token: ${SLACK_BOT_TOKEN}
  channel:
    id: ${SLACK_CHANNEL_ID}